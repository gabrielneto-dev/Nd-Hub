<!-- Modal de Adicionar Projeto -->
<div id="add-proj-modal" class="hidden fixed inset-0 bg-slate-900/50 z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl w-full max-w-md shadow-2xl p-6">
        <h3 class="text-xl font-bold text-slate-800 mb-4">Adicionar um Projeto</h3>
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Apelido do Projeto</label>
                <input type="text" id="add-proj-name" placeholder="Ex: Meu Site React"
                    class="w-full py-2 px-3 border border-slate-300 rounded-lg focus:ring-1 focus:ring-brand-500 focus:outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Caminho Físico (Path)</label>
                <input type="text" id="add-proj-path" placeholder="/home/neto/Documentos/site"
                    class="w-full py-2 px-3 border border-slate-300 rounded-lg focus:ring-1 focus:ring-brand-500 focus:outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Start Hook Automático (Bash)</label>
                <input type="text" id="add-proj-pre" placeholder="Ex: source .venv/bin/activate"
                    class="w-full py-2 px-3 border border-slate-300 rounded-lg focus:ring-1 focus:ring-brand-500 focus:outline-none text-slate-500 font-mono text-xs">
                <p class="text-[10px] text-slate-400 mt-1">Este hook roda silênciosamente antes de abrir o editor de código.</p>
            </div>
        </div>
        <div class="mt-6 flex space-x-3">
            <button onclick="window.saveNewProject()"
                class="flex-1 bg-brand-600 text-white font-medium py-2 rounded-lg hover:bg-brand-700 transition active:scale-95">Salvar Ficha</button>
            <button onclick="window.toggleAddProjectModal(false)"
                class="flex-1 bg-slate-100 text-slate-600 font-medium py-2 rounded-lg hover:bg-slate-200 transition active:scale-95">Cancelar</button>
        </div>
    </div>
</div>

<!-- Modal de Preview Nativo -->
<div id="fs-preview-modal"
    class="hidden fixed inset-0 bg-slate-900/90 z-[60] flex items-center justify-center p-4 backdrop-blur-md opacity-0 transition-opacity duration-300 pointer-events-none cursor-pointer"
    onclick="window.closeFsPreview()">
    <div class="bg-transparent rounded-2xl w-full h-[95vh] shadow-2xl overflow-hidden flex flex-col pointer-events-auto">
        <div class="flex justify-between items-center p-4" onclick="event.stopPropagation()">
            <div class="bg-slate-800/80 backdrop-blur px-4 py-2 rounded-full border border-slate-700 max-w-sm sm:max-w-xl truncate">
                <h3 id="fs-preview-title" class="text-sm font-mono text-slate-200">/preview.png</h3>
            </div>
            <div class="flex space-x-2">
                <button onclick="window.closeFsPreview()"
                    class="text-slate-400 hover:text-white bg-slate-800/80 backdrop-blur p-2 rounded-full border border-slate-700 transition w-10 h-10 flex items-center justify-center shadow-lg hover:bg-red-500/20 hover:border-red-500/30"><i
                        class="ph ph-x"></i></button>
            </div>
        </div>
        <div class="p-2 sm:p-6 flex-1 overflow-auto flex items-center justify-center cursor-pointer" id="fs-preview-content">
            <!-- content dynamically inserted -->
        </div>
    </div>
</div>

<!-- Modal Checkout Local -->
<div id="fs-checkout-modal"
    class="hidden fixed inset-0 bg-slate-900/90 z-[60] flex items-center justify-center p-4 backdrop-blur-md opacity-0 transition-opacity duration-300"
    onclick="window.closeFsCheckoutModal(event)">
    <div class="bg-slate-50 rounded-2xl w-full max-w-5xl max-h-[90vh] shadow-2xl flex flex-col overflow-hidden border border-slate-300"
        onclick="event.stopPropagation()">
        <div class="p-5 border-b border-slate-200 flex justify-between items-center bg-white shadow-sm z-10 relative">
            <div>
                <h3 class="text-xl font-bold text-slate-800 flex items-center"><i
                        class="ph ph-list-checks text-brand-600 mr-2 text-3xl"></i> Checkout Lógico (Motor In-Place)</h3>
                <p class="text-xs text-slate-500 mt-1 max-w-md">Especifique extensões globais para blocos inteiros. Tudo acontecerá fisicamente no seu computador sem envolver downloads web.</p>
            </div>
            <button onclick="window.closeFsCheckoutModal()"
                class="w-10 h-10 flex items-center justify-center rounded-full bg-slate-100 hover:bg-slate-200 text-slate-600 transition"><i
                    class="ph ph-x"></i></button>
        </div>

        <div class="bg-slate-100 p-4 border-b border-slate-200 flex flex-col sm:flex-row gap-4 z-0">
            <div class="flex-1">
                <label class="block text-xs font-bold text-slate-500 uppercase mb-1">🔖 Prefixo do Arquivo Físico</label>
                <input type="text" id="local-config-prefix" placeholder="Ex: edit_"
                    class="w-full bg-white border border-slate-300 text-slate-700 text-sm rounded px-3 py-2 outline-none focus:border-brand-500 shadow-sm">
            </div>
            <div class="flex-1">
                <label class="block text-xs font-bold text-slate-500 uppercase mb-1">📁 Subpasta Relativa de Destino</label>
                <input type="text" id="local-config-folder" placeholder="Ex: editadas"
                    class="w-full bg-white border border-slate-300 text-slate-700 text-sm rounded px-3 py-2 outline-none focus:border-brand-500 shadow-sm">
            </div>
        </div>

        <div class="p-6 overflow-y-auto flex-1 space-y-6" id="fs-checkout-blocks-container">
            <!-- Preenchido pelo Javascript -->
        </div>
    </div>
</div>
