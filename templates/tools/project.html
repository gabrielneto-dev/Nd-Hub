<!-- Project Manager Area -->
<div id="project-ui-area" class="hidden-view mt-4">
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6">
        <div>
            <h3 class="text-xl font-semibold text-slate-800">Portfólio de Códigos</h3>
            <p class="text-sm text-slate-500 mt-1">Gerencie e abra instâncias instantâneas de projetos via Nvim.</p>
        </div>
        <button onclick="window.toggleAddProjectModal(true)"
            class="mt-4 md:mt-0 bg-brand-600 hover:bg-brand-700 text-white font-medium px-4 py-2 rounded-lg transition-colors flex items-center shadow-sm">
            <i class="ph ph-plus-circle mr-2 text-lg"></i> Adicionar Local
        </button>
    </div>

    <div class="bg-white border border-slate-200 rounded-xl overflow-hidden shadow-sm">
        <div class="overflow-x-auto">
            <table class="w-full text-left text-sm whitespace-nowrap">
                <thead class="bg-slate-50 text-slate-500 font-medium border-b border-slate-200">
                    <tr>
                        <th class="px-6 py-4">Nome</th>
                        <th class="px-6 py-4">Caminho / Start Hook</th>
                        <th class="px-6 py-4 text-center">Status Válido</th>
                        <th class="px-6 py-4 text-right">Ação NeoVim</th>
                    </tr>
                </thead>
                <tbody id="projects-table-body" class="divide-y divide-slate-100 text-slate-700">
                    <tr>
                        <td colspan="4" class="px-6 py-8 text-center text-slate-400">
                            <i class="ph ph-spinner-gap animate-spin text-2xl mb-2 text-brand-500"></i>
                            <p>Sincronizando SQLite...</p>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
